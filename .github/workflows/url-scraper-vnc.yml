name: URL Scraper VNC

on:
  workflow_dispatch:

env:
  DISPLAY: ":1"
  VNC_PORT: 5901
  NOVNC_PORT: 6080
  VNC_PASSWORD: "botxbyte123"
  SCRAPER_DIR: "/home/runner/url-scraper-local"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Clone url-scraper-local code
        run: |
          git clone https://github.com/domain-metrcis/url-scraper-local-2.git url-scraper-local
          rm -rf "$SCRAPER_DIR"
          mv url-scraper-local "$SCRAPER_DIR"
          echo "✅ url-scraper-local ready at $SCRAPER_DIR"
          ls -la "$SCRAPER_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Optimize APT mirror
        timeout-minutes: 3
        run: |
          echo "Optimizing APT mirror and network settings..."
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true

          cat << 'EOF' | sudo tee /etc/apt/apt.conf.d/99ci-network >/dev/null
          Acquire::Retries "6";
          Acquire::http::Timeout "15";
          Acquire::https::Timeout "15";
          Acquire::ForceIPv4 "true";
          EOF

          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i 's|https://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list
            sudo sed -i 's|https://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list
          fi

          sudo apt-get -o Acquire::Retries=6 update -q
          echo "✅ APT optimization complete"

      - name: Install Desktop Environment (XFCE + VNC)
        timeout-minutes: 18
        run: |
          echo "Installing XFCE desktop and TurboVNC..."
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true

          for i in $(seq 1 12); do
            if ! sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then break; fi
            echo "Waiting for dpkg lock... ($i/12)"; sleep 5
          done

          mkdir -p ~/cached-debs

          # Parallel downloads
          (wget -q -O ~/cached-debs/turbovnc_2.2.5_amd64.deb \
            https://phoenixnap.dl.sourceforge.net/project/turbovnc/2.2.5/turbovnc_2.2.5_amd64.deb && echo "✅ TurboVNC downloaded") &
          PID_VNC=$!
          (cd ~ && git clone --depth 1 https://github.com/novnc/noVNC.git && \
            cd noVNC && git clone --depth 1 https://github.com/novnc/websockify.git && echo "✅ noVNC cloned") &
          PID_NOVNC=$!

          # Install XFCE while downloads happen
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            xfce4 xfce4-terminal dbus-x11 x11-utils x11-xserver-utils xfonts-base net-tools

          echo "✅ XFCE installed"

          wait $PID_VNC && sudo dpkg -i ~/cached-debs/turbovnc_2.2.5_amd64.deb
          echo "✅ TurboVNC installed"

          wait $PID_NOVNC
          echo "✅ noVNC ready"

      - name: Configure VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          mkdir -p ~/.vnc
          echo "${VNC_PASSWORD}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup.turbovnc << 'EOF'
          #!/bin/bash
          export NO_AT_BRIDGE=1
          export SESSION_MANAGER=""
          dbus-launch /usr/bin/startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup.turbovnc
          echo "✅ VNC configured (password: botxbyte123)"

      - name: Start VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          echo "Starting TurboVNC server on display :1..."
          vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT 2>&1 | tee /tmp/vnc-start.log

          for i in $(seq 1 15); do
            if pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "✅ TurboVNC started in ${i}s on port $VNC_PORT"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Failed to start VNC server"; cat /tmp/vnc-start.log; exit 1

      - name: Start noVNC (Web VNC)
        run: |
          echo "Starting noVNC web server..."
          cd ~/noVNC
          ./utils/novnc_proxy --vnc localhost:$VNC_PORT --listen $NOVNC_PORT > /tmp/novnc.log 2>&1 &

          for i in $(seq 1 10); do
            if netstat -tuln | grep :$NOVNC_PORT > /dev/null; then
              echo "✅ noVNC started in ${i}s on port $NOVNC_PORT"
              exit 0
            fi
            sleep 1
          done
          echo "❌ noVNC failed to start"; cat /tmp/novnc.log; exit 1

      - name: Install cloudflared
        run: |
          echo "Installing cloudflared..."
          wget -q -O /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version
          echo "✅ cloudflared installed"

      - name: Start Cloudflare Quick Tunnel
        id: tunnel
        run: |
          echo "Starting Cloudflare quick tunnel for noVNC..."
          cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &

          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to obtain tunnel URL"; cat /tmp/tunnel.log; exit 1
          fi

          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Cloudflare tunnel ready: $TUNNEL_URL"

      - name: Start Cloudflare Tunnel for Scraper API
        id: scraper_tunnel
        run: |
          echo "Starting Cloudflare quick tunnel for scraper API (port 8814)..."
          cloudflared tunnel --no-autoupdate --url http://localhost:8814 > /tmp/scraper-tunnel.log 2>&1 &

          SCRAPER_TUNNEL_URL=""
          for i in $(seq 1 30); do
            SCRAPER_TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/scraper-tunnel.log | head -1)
            if [ -n "$SCRAPER_TUNNEL_URL" ]; then break; fi
            sleep 2
          done

          if [ -z "$SCRAPER_TUNNEL_URL" ]; then
            echo "❌ Failed to obtain scraper tunnel URL"; cat /tmp/scraper-tunnel.log; exit 1
          fi

          echo "scraper_tunnel_url=$SCRAPER_TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Scraper tunnel ready: $SCRAPER_TUNNEL_URL"

      - name: Setup vendored chromium + cf-autoclick extension
        timeout-minutes: 5
        run: |
          echo "[*] Populating $SCRAPER_DIR/vendor/ ..."
          cd "$SCRAPER_DIR"
          bash tools/setup_vendor.sh

          # Copy real-botxbyte-extension into vendor
          cp -r "$SCRAPER_DIR/real-botxbyte-extension" "$SCRAPER_DIR/vendor/real-botxbyte-extension"

          test -x vendor/ungoogled-chromium/chrome \
            || { echo "❌ vendor/ungoogled-chromium/chrome missing"; exit 1; }
          test -f vendor/cf-autoclick/manifest.json \
            || { echo "❌ vendor/cf-autoclick/manifest.json missing"; exit 1; }
          test -f vendor/real-botxbyte-extension/manifest.json \
            || { echo "❌ vendor/real-botxbyte-extension/manifest.json missing"; exit 1; }
          echo "✅ Vendor setup complete (with real-botxbyte-extension)"

      - name: Start URL Scraper
        run: |
          echo "Starting url_scraper.py (3 parallel browsers)..."
          export DISPLAY=:1
          export NO_AT_BRIDGE=1
          cd "$SCRAPER_DIR"
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --no-cache-dir undetected-chromedriver requests setuptools flask
          nohup python3 url_scraper.py > /tmp/url-scraper.log 2>&1 &
          SCRAPER_PID=$!
          echo "  Scraper PID: $SCRAPER_PID"
          sleep 5

          if kill -0 $SCRAPER_PID 2>/dev/null; then
            echo "✅ URL scraper started (PID: $SCRAPER_PID, sequential queue)"
          else
            echo "❌ URL scraper failed to start"; cat /tmp/url-scraper.log; exit 1
          fi

      - name: Test scraper with sample URL
        run: |
          echo "Testing scraper with a sample URL..."
          sleep 10
          RESPONSE=$(curl -s -X POST http://localhost:8814/url-scraper-service/api/v1/scrape/ \
            -H "Content-Type: application/json" \
            -d '{"target_url": "https://example.com"}')
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"status"'; then
            echo "✅ Scraper test passed!"
          else
            echo "⚠️ Unexpected response, but scraper is running"
          fi

      - name: Register Scraper URL to Backend
        env:
          SCRAPER_TUNNEL_URL: ${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}
        run: |
          echo "Registering scraper to backend (no auth required)..."
          RESP=$(curl -s -X POST "https://backend.articleinnovator.com/article-management-service/api/v1/health/" \
            -H "Content-Type: application/json" \
            -d "{\"scraper_url\": \"$SCRAPER_TUNNEL_URL\", \"action\": \"register\"}")
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'✅ {d.get(\"message\",\"\")} — URLs: {d.get(\"registered_urls\",[])}' if d.get('success') else f'❌ Failed: {d}')"

      - name: Display Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           🎉 URL SCRAPER VNC IS RUNNING! 🎉                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 VNC Access URL: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html"
          echo "🔑 Password: botxbyte123"
          echo ""
          echo "🚀 Scraper API Tunnel: ${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}"
          echo "   POST ${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}/url-scraper-service/api/v1/scrape/"
          echo ""
          echo "📋 Architecture: Multi-browser pool — 3 browsers, 1 tab each, parallel"
          echo "   3x throughput, no more timeout issues!"
          echo ""

      - name: Keep Session Alive
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          set +e
          echo "Keeping VNC session alive..."

          while true; do
            echo "🌐 VNC: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html | Password: botxbyte123"
            echo "🚀 Scraper: ${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}"

            # Restart VNC if it died
            if ! pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "❌ VNC stopped! Restarting..."
              vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT
              sleep 3
            fi

            # Restart tunnels if they died
            TUNNEL_COUNT=$(pgrep -cx "cloudflared")
            if [ "$TUNNEL_COUNT" -lt 2 ]; then
              echo "❌ Tunnel(s) stopped! Restarting..."
              pkill -x cloudflared || true
              sleep 2
              cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &
              cloudflared tunnel --no-autoupdate --url http://localhost:8814 > /tmp/scraper-tunnel.log 2>&1 &
              sleep 5
            fi

            # Restart scraper if it died
            if ! pgrep -f "url_scraper.py" > /dev/null; then
              echo "⚠️ URL scraper stopped! Restarting..."
              export DISPLAY=:1
              export NO_AT_BRIDGE=1
              cd "$SCRAPER_DIR"
              source .venv/bin/activate
              nohup python3 url_scraper.py > /tmp/url-scraper.log 2>&1 &
              sleep 3
            fi

            sleep 30
          done

      - name: Cleanup VNC
        if: always()
        timeout-minutes: 1
        env:
          SCRAPER_TUNNEL_URL: ${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin

          # Deregister scraper URL from backend
          if [ -n "$SCRAPER_TUNNEL_URL" ]; then
            echo "Deregistering scraper URL..."
            curl -s -X POST "https://backend.articleinnovator.com/article-management-service/api/v1/health/" \
              -H "Content-Type: application/json" \
              -d "{\"scraper_url\": \"$SCRAPER_TUNNEL_URL\", \"action\": \"deregister\"}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'✅ Deregistered' if d.get('success') else f'⚠️ {d}')" 2>/dev/null || true
          fi

          pkill -f "url_scraper.py" || true
          pkill -x cloudflared || true
          vncserver -kill :1 || true
          echo "✅ Cleanup complete"
