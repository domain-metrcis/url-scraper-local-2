name: URL Scraper VNC

on:
  workflow_dispatch:

env:
  DISPLAY: ":1"
  VNC_PORT: 5901
  NOVNC_PORT: 6080
  VNC_PASSWORD: "botxbyte123"
  SCRAPER_DIR: "/home/runner/url-scraper-local"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Clone url-scraper-local code
        run: |
          git clone --depth 1 https://github.com/domain-metrcis/url-scraper-local-2.git url-scraper-local
          rm -rf "$SCRAPER_DIR"
          mv url-scraper-local "$SCRAPER_DIR"
          echo "✅ Code ready at $SCRAPER_DIR"
          ls "$SCRAPER_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Optimize APT mirror
        timeout-minutes: 3
        run: |
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true
          cat << 'EOF' | sudo tee /etc/apt/apt.conf.d/99ci-network >/dev/null
          Acquire::Retries "6";
          Acquire::http::Timeout "15";
          Acquire::https::Timeout "15";
          Acquire::ForceIPv4 "true";
          EOF
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
          fi
          sudo apt-get -o Acquire::Retries=6 update -q
          echo "✅ APT optimized"

      - name: Install Desktop Environment (XFCE + VNC)
        timeout-minutes: 18
        run: |
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          for i in $(seq 1 12); do
            if ! sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then break; fi
            echo "Waiting for dpkg lock... ($i/12)"; sleep 5
          done
          mkdir -p ~/cached-debs
          (wget -q -O ~/cached-debs/turbovnc_2.2.5_amd64.deb \
            https://phoenixnap.dl.sourceforge.net/project/turbovnc/2.2.5/turbovnc_2.2.5_amd64.deb && echo "✅ TurboVNC downloaded") &
          PID_VNC=$!
          (cd ~ && git clone --depth 1 https://github.com/novnc/noVNC.git && \
            cd noVNC && git clone --depth 1 https://github.com/novnc/websockify.git && echo "✅ noVNC cloned") &
          PID_NOVNC=$!
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            xfce4 xfce4-terminal dbus-x11 x11-utils x11-xserver-utils xfonts-base net-tools
          echo "✅ XFCE installed"
          wait $PID_VNC && sudo dpkg -i ~/cached-debs/turbovnc_2.2.5_amd64.deb
          echo "✅ TurboVNC installed"
          wait $PID_NOVNC
          echo "✅ noVNC ready"

      - name: Configure & Start VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          mkdir -p ~/.vnc
          echo "${VNC_PASSWORD}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          cat > ~/.vnc/xstartup.turbovnc << 'EOF'
          #!/bin/bash
          export NO_AT_BRIDGE=1
          export SESSION_MANAGER=""
          dbus-launch /usr/bin/startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup.turbovnc
          vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT 2>&1 | tee /tmp/vnc-start.log
          for i in $(seq 1 15); do
            if pgrep -f "Xvnc.*:1" > /dev/null; then echo "✅ VNC started"; exit 0; fi
            sleep 1
          done
          echo "❌ VNC failed"; exit 1

      - name: Start noVNC (Web VNC)
        run: |
          cd ~/noVNC
          ./utils/novnc_proxy --vnc localhost:$VNC_PORT --listen $NOVNC_PORT > /tmp/novnc.log 2>&1 &
          for i in $(seq 1 10); do
            if netstat -tuln | grep :$NOVNC_PORT > /dev/null; then echo "✅ noVNC started"; exit 0; fi
            sleep 1
          done
          echo "❌ noVNC failed"; exit 1

      - name: Install cloudflared
        run: |
          wget -q -O /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          echo "✅ cloudflared installed"

      - name: Start Cloudflare Tunnel (VNC)
        id: tunnel
        run: |
          cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$TUNNEL_URL" ]; then echo "❌ Tunnel failed"; cat /tmp/tunnel.log; exit 1; fi
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ VNC Tunnel: $TUNNEL_URL"

      - name: Start Cloudflare Tunnel (Scraper API)
        id: scraper_tunnel
        run: |
          cloudflared tunnel --no-autoupdate --url http://localhost:8814 > /tmp/scraper-tunnel.log 2>&1 &
          SCRAPER_TUNNEL_URL=""
          for i in $(seq 1 30); do
            SCRAPER_TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/scraper-tunnel.log | head -1)
            if [ -n "$SCRAPER_TUNNEL_URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$SCRAPER_TUNNEL_URL" ]; then echo "❌ Scraper tunnel failed"; cat /tmp/scraper-tunnel.log; exit 1; fi
          echo "scraper_tunnel_url=$SCRAPER_TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Scraper Tunnel: $SCRAPER_TUNNEL_URL"

      - name: Setup ungoogled-chromium + cf-autoclick
        timeout-minutes: 5
        run: |
          cd "$SCRAPER_DIR"
          mkdir -p vendor

          # Download ungoogled-chromium
          CHROMIUM_VERSION="149.0.7827.53-1"
          CHROMIUM_URL="https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/${CHROMIUM_VERSION}/ungoogled-chromium-${CHROMIUM_VERSION}-x86_64_linux.tar.xz"
          curl -fL -o /tmp/chromium.tar.xz "$CHROMIUM_URL"
          tar -xJf /tmp/chromium.tar.xz -C vendor/
          mv vendor/ungoogled-chromium-* vendor/ungoogled-chromium
          chmod +x vendor/ungoogled-chromium/chrome
          vendor/ungoogled-chromium/chrome --version
          echo "✅ Chromium ready"

          # Clone cf-autoclick extension
          git clone --depth 1 https://github.com/tenacious6/cf-autoclick.git vendor/cf-autoclick
          test -f vendor/cf-autoclick/manifest.json
          echo "✅ cf-autoclick ready"

      - name: Install Python deps & Start Scraper
        run: |
          cd "$SCRAPER_DIR"
          pip install flask websocket-client requests
          export DISPLAY=:1
          nohup python3 scraper.py \
            --port 8814 \
            --chrome "$SCRAPER_DIR/vendor/ungoogled-chromium/chrome" \
            --extension "$SCRAPER_DIR/vendor/cf-autoclick" \
            --max-concurrent 3 \
            --timeout 60 \
            > /tmp/scraper.log 2>&1 &
          SCRAPER_PID=$!
          sleep 3
          if kill -0 $SCRAPER_PID 2>/dev/null; then
            echo "✅ Scraper started (PID: $SCRAPER_PID)"
          else
            echo "❌ Scraper failed"; cat /tmp/scraper.log; exit 1
          fi

      - name: Test scraper
        run: |
          sleep 5
          curl -s http://localhost:8814/url-scraper-service/api/v1/health/ | python3 -m json.tool
          RESULT=$(curl -s --max-time 60 -X POST http://localhost:8814/url-scraper-service/api/v1/scrape/ \
            -H "Content-Type: application/json" \
            -d '{"target_url": "https://example.com", "selectors": []}')
          echo "$RESULT" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          assert d.get('success'), f'Failed: {d.get(\"error\")}'
          print('✅ Scrape test passed')
          "

      - name: Register scraper with Article Innovator
        run: |
          SCRAPER_URL="${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}"
          echo "Registering: $SCRAPER_URL"
          curl -s -X POST "https://backend.articleinnovator.com/configuration-service/api/v1/workspace-settings/register-scraper/" \
            -H "Content-Type: application/json" \
            -d "{\"scraper_url\": \"$SCRAPER_URL\"}" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          if d.get('success'):
              print(f'✅ Registered! Total scrapers: {d[\"data\"][\"total_scrapers\"]}')
          else:
              print(f'⚠️ Registration: {d.get(\"message\", d.get(\"error\",\"\"))}')
          "

      - name: Display Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           🎉 URL SCRAPER IS RUNNING! 🎉                     ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ 🌐 VNC: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html"
          echo "║ 🔑 Password: botxbyte123"
          echo "║ 🚀 Scraper: ${{ steps.scraper_tunnel.outputs.scraper_tunnel_url }}"
          echo "║ 📡 Registered with Article Innovator ✓"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      - name: Keep Session Alive
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          set +e
          echo "Keeping alive for 6 hours..."

          while true; do
            # Restart VNC if died
            if ! pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "$(date) ⚠️ VNC died, restarting..."
              vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT
              sleep 3
            fi

            # Restart tunnels if died
            TUNNEL_COUNT=$(pgrep -cx "cloudflared")
            if [ "$TUNNEL_COUNT" -lt 2 ]; then
              echo "$(date) ⚠️ Tunnel(s) died, restarting..."
              pkill -x cloudflared || true
              sleep 2
              cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &
              cloudflared tunnel --no-autoupdate --url http://localhost:8814 > /tmp/scraper-tunnel.log 2>&1 &
              sleep 5
            fi

            # Restart scraper if died
            if ! pgrep -f "scraper.py" > /dev/null; then
              echo "$(date) ⚠️ Scraper died, restarting..."
              export DISPLAY=:1
              cd "$SCRAPER_DIR"
              nohup python3 scraper.py \
                --port 8814 \
                --chrome "$SCRAPER_DIR/vendor/ungoogled-chromium/chrome" \
                --extension "$SCRAPER_DIR/vendor/cf-autoclick" \
                --max-concurrent 3 \
                --timeout 60 \
                > /tmp/scraper.log 2>&1 &
              sleep 3
            fi

            sleep 30
          done

      - name: Deregister scraper from Article Innovator
        if: always()
        timeout-minutes: 1
        run: |
          DEREGISTER_URL="https://backend.articleinnovator.com/configuration-service/api/v1/workspace-settings/deregister-scraper/"

          # Collect ALL unique trycloudflare URLs from scraper tunnel log (handles restarts)
          URLS=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/scraper-tunnel.log 2>/dev/null | sort -u)

          if [ -z "$URLS" ]; then
            echo "⚠️ No scraper tunnel URLs found in log"
          else
            echo "$URLS" | while read -r SCRAPER_URL; do
              echo "Deregistering: $SCRAPER_URL"
              curl -s --max-time 10 -X POST "$DEREGISTER_URL" \
                -H "Content-Type: application/json" \
                -d "{\"scraper_url\": \"$SCRAPER_URL\"}" 2>/dev/null \
                | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print(f'  ✅ Done' if d.get('success') else f'  ⚠️ {d.get(\"message\",\"\")}')
          except:
              print('  ⚠️ No response')
          " || true
            done
          fi

          # Also deregister from the legacy endpoint (article-management-service)
          if [ -n "$URLS" ]; then
            echo "$URLS" | while read -r SCRAPER_URL; do
              curl -s --max-time 10 -X POST \
                "https://backend.articleinnovator.com/article-management-service/api/v1/scraper-registry/deregister/" \
                -H "Content-Type: application/json" \
                -d "{\"scraper_url\": \"$SCRAPER_URL\"}" 2>/dev/null || true
            done
          fi
          echo "✅ Deregistration complete"

      - name: Cleanup
        if: always()
        timeout-minutes: 1
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          pkill -f "scraper.py" || true
          pkill -x cloudflared || true
          vncserver -kill :1 || true
          echo "✅ Cleanup complete"
